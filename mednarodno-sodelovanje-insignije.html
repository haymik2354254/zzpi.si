<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | ZZPI</title>
    <meta name="description" content="{{ excerpt }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Paste ALL your styles from the mednarodno-sodelovanje-insignije.html here */
        :root { --primary-color: #1a2a6c; --secondary-color: #2a3a7c; --text-color: #2c3e50; --bg-color: #f0f2f5; }
        body { font-family: 'Roboto', sans-serif; line-height: 1.8; color: var(--text-color); background-color: var(--bg-color); margin: 0; }
        .article-wrap { max-width: 850px; margin: 40px auto; background: #fff; padding: 60px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        header.article-header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 40px; }
        header.article-header a { text-decoration: none; color: var(--primary-color); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--primary-color); margin: 20px 0; line-height: 1.2; }
        .meta { color: #999; text-transform: uppercase; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
        .hero-img { width: 100%; height: 450px; object-fit: cover; border-radius: 4px; margin-bottom: 40px; }
        p { margin-bottom: 25px; font-size: 1.15rem; text-align: justify; }
        .quote-box { background: #f8f9fa; border-left: 5px solid var(--primary-color); padding: 35px; margin: 40px 0; font-style: italic; font-size: 1.2rem; color: #444; }
        footer { text-align: center; padding: 40px; color: #777; font-size: 0.9rem; }
        @media (max-width: 600px) { .article-wrap { padding: 30px 20px; } h1 { font-size: 2rem; } }
    </style>
</head>
<body>

<div class="article-wrap">
    <header class="article-header">
        <a href="../index.html">← Nazaj na arhiv ZZPI</a>
    </header>

    <article>
        <div class="meta">{{ date }} | {{ category or 'ZZPI' }}</div>
        <h1>{{ title }}</h1>
        
        <img src="{{ image }}" alt="{{ title }}" class="hero-img">

        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</div>

<footer>
    &copy; 2026 Združenje zbirateljev policijskih insignij (ZZPI)
</footer>

</body>
</html>
